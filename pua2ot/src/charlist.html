<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
            <style>
            @font-face {
                font-family: "junicode";
                src: url("../fonts/JunicodeVF-Roman.woff2");
                font-weight: 300 700;
                font-stretch: 75% 125%;
            }
            @font-face {
                font-family: "junicode";
                src: url("../fonts/JunicodeVF-Italic.woff2");
                font-style: italic;
                font-weight: 300 700;
                font-stretch: 75% 125%;
            }
            @font-face {
                font-family: "notosans";
                src: url("../fonts/NotoSans-Regular.woff2");
            }
            body {
                margin-left: 10%;
                margin-right: 10%;
                font-family: junicode;
                font-size: 125%;
            }
            table, th, td {
                border: 1px solid black;
                font-size: 100%;
            }
            td {
                padding: 4px;
            }
            .char {
                background-color: Violet;
            }
            .otag {
                background-color: Gold;
            }
            .utag {
                background-color: MistyRose;
                font-feature-settings: "ss10";
            }
            .zwj {
                background-color: PaleGreen;
                font-feature-settings: "ss10";
            }
            .entity {
                background-color: PowderBlue;
                font-feature-settings: "ss10";
            }
            #dialogtext {
                font-family: notosans;
            }
            </style>
    </head>
    <body lang="is">
        <p>
            For testing. In each row, the characters in the colored boxes
            should look the same. Click on any of the rightmost four columns
            (when they have content) to see the underlying code.
        </p>
        <dialog id="method_info">
            <form method="dialog">
                <p>Info for method:</p>
                <pre id="dialogtext"></pre>
                <button id="closeDialog">Close</button>
            </form>
        </dialog>
        <script src="./PUA2OT_DATA.js"></script>
        <script src="./pua2ot-common.js"></script>
        <script>
            options.defaultTags = {"ss10": 1};
            options.lang = "is";
        </script>
        <script src="./mklist.js"></script>
    </body>
</html>
