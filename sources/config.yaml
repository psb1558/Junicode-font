# run -> gftools builder config.yaml
sources:
  - Junicode.glyphspackage
  - Junicode-Italic.glyphspackage
familyName: "Junicode"
buildStatic: false
cleanUp: true
axisOrder:
  - wdth
  - wght
  - ital
stat:
  Junicode[ENLA,wdth,wght].ttf:
  - name: Enlarge
    tag: ENLA
    values:
    - name: Normal
      value: 0
      flags: 2
    - name: Enlarge
      value: 100   
  - name: Width
    tag: wdth
    values:
    - name: Condensed
      value: 75
    - name: SemiCondensed
      value: 87.5
    - name: Normal
      value: 100
      flags: 2
    - name: SemiExpanded
      value: 112.5
    - name: Expanded
      value: 125
  - name: Weight
    tag: wght
    values:
    - name: Light
      value: 300
    - name: Regular
      value: 400
      linkedValue: 700
      flags: 2
    - name: Medium
      value: 500
    - name: SemiBold
      value: 600
    - name: Bold
      value: 700
  - name: Italic
    tag: ital
    values:
    - name: Roman
      value: 0
      linkedValue: 1
      flags: 2
  Junicode-Italic[ENLA,wdth,wght].ttf:
  - name: Enlarge
    tag: ENLA
    values:
    - name: Normal
      value: 0
      flags: 2
    - name: Enlarge
      value: 100   
  - name: Width
    tag: wdth
    values:
    - name: Condensed
      value: 75
    - name: SemiCondensed
      value: 87.5
    - name: Normal
      value: 100
      flags: 2
    - name: SemiExpanded
      value: 112.5
    - name: Expanded
      value: 125
  - name: Weight
    tag: wght
    values:
    - name: Light
      value: 300
    - name: Regular
      value: 400
      linkedValue: 700
      flags: 2
    - name: Medium
      value: 500
    - name: SemiBold
      value: 600
    - name: Bold
      value: 700
  - name: Italic
    tag: ital
    values:
    - name: Italic
      value: 1
